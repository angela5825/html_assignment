<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <title>Western</title>
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    @font-face {
      font-family: 'Paperozi';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }

    * {
      margin: 0;
      font-family: 'Paperozi';

    }
    .header-img{
      background-color :white;
      text-align : center;
    }
    header {
      padding: 0 20px;
      text-align: left;
    }

    header h3 {
      font-weight: bold;
      margin-left: 10px;
    }

    header h3,
    header p {
      padding: 10px 10px;
    }

    header h3 {
      margin-top: 20px;
    }

    header img {
      height: 100px;
      width: 200px;
    }

    .go-home{
      position: fixed;
      right : 30px;
      top : 20px;
      padding : 4px;
      background-color : white;
      font-size: 20px;
      border-radius : 20px;
    }

    .container {
      display: flex;
      gap: 20px;

    }

    aside {
      width: 15%;
      min-height: 100vh;
      font-size: 14px;
      padding: 20px;
      border-right: 1px solid #ddd;
      background-color: #f8f8f8;
    }

    aside  a{
      text-decoration: none;
      color : black;
    }

    .main {
      flex: 1;
    }

    .menu-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    @keyframes effect {
      0% {
        transform: translateY(0px);
        
      }
      50%{
        transform: translateY(-5px);
      }
      100% {
        transform: translateY(0);
       
      }
    }

    .menu:hover {
      animation: effect 0.3s ease;
    }

    .menu {
      
      width: 220px;
      height: 220px;
      padding: 15px;
      border: 1px solid #F7F1DE;
      text-align: center;
      justify-content: center;
      transition: 0.3s;
      background-color: #B0BA99;
      border-radius: 4px;

    }

    .menu img {
      width: 180px;
      height: 180px;
      margin: 3px;
    }

    .menu .inst{
      background-color: #F7F1DE;
      border-radius : 3px;
    }

    footer{
      /* margin-top : 20px; */
      padding: 40px;  
      margin-bottom: 10px;

    }

    footer a{
      text-decoration: none;
      color : #4E220F;
    }

    /* 테블릿 사이즈 (768px 이하) */
    @media screen and (max-width : 768px){

      .container {
        display : flex;
        flex-direction :column;
      }
      main{
        padding : 20px;
      }
    
      main h2{
        text-align: center;
      }
      aside {
        box-sizing : border-box;
        width : 100%;
        min-height : auto;
        border-right : none;
        border-bottom: 1px solid #ddd;
        
      }
      .menu-list {
        justify-content : flex-start;

      }
      .menu {
        width : 170px;
        height : auto;

      }
      .menu img{
        width :  100%;
        height : 130px;
        margin : 0 auto;
        margin-bottom:5px;
        display : block;
      }

      .menu .inst{
        width : 100%;
        
        margin : 0 auto;
        box-sizing :border-box;
        

      }
      header img{
        min-width : 20%;
        height : auto
      }
    }
    /* 모바일 사이즈 - 480px 이하 */
    @media screen and (max-width: 480px){
      .container {
        display: flex;
        flex-direction: column;
      }

      
      .header-img {
        width: 100%;
        overflow : hidden

      }
      header img{
        min-width : 5%;

      }

      main {
        padding : 10px;
      }

      header h2{
        font-size : 18px;
      }

      header p{
        font-size : 12px;
        line-height : 1.2;
      }
      
      .go-home{
        font-size : 14px;
      }

      aside {
        font-size : 12px;
        padding : 15px;
      }
      aside h3{
        font-size : 14px;
      }

      main h2{
        font-size : 16px;
      }

      .menu-list {
        justify-content: center;
        gap : 10px;
      }

      .menu {
        width : 130px;
        padding : 10px;
        height : 130px;
      }

      .menu img {
        width : 100%;
        height : 73%;
        margin-bottom : 10px;
      }
      .menu .inst {
        padding : 2px;
      }

      .menu .inst p{
        font-size : 9.5px;
        line-height : 1.24;
      }

      footer h2{
        font-size :14px; 
      }
      footer h3{
        font-size : 12px;

      }
    

    }
  </style>
</head>

<body>
  <header>

    <main>

    </main>
    
  </div>
  <footer>
    <h2>같이 들리면 좋은 카페 ☕️</h2>
    <div class="cafe">
      <h3><a href="https://map.naver.com/p/entry/place/1956591980?c=15.69,0,0,0,dh&placePath=/menu&from=map&fromPanelNum=1&additionalHeight=76&timestamp=202606131957&locale=ko&svcName=map_pcv5">우디집 로스터리</a></h3>
    </div>
  </footer>
</body>

</html>
