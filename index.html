<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    @font-face {
    font-family: 'Escoredream';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-6Bold.woff') format('woff');
    font-weight: 600;
    font-display: swap;
}
@font-face {
    font-family: 'KerisKedyuche';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_R.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}
@font-face {
    font-family: 'GangwonEducationModuche';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEdu_OTFBoldA.woff') format('woff');
    font-weight: 700;
    font-display: swap;
}

*{
  margin : 0;

}
body{
  font-family :'GangwonEducationModuche';
 
}
header {
  margin-top:10px;
  font-size: 40px;
  text-align: center;
  margin-bottom: 30px;

  padding : 10px;
  background-color : #cae7f6;
}
nav {
  font-size : 30px;
  display: flex;
  justify-content: center; 
  gap : 15px;
}

@keyframes fly{
  0%{
    transform: translateY(0);
  }

  50%{
    transform: translateY(-10px);
  }

  100%{
    transform: translateY(0);
  }
}

.category{
  width: 150px;
  height : 150px;
  border : 1px solid #ccc;
  border-radius: 30%;
  text-align: center;
  display: flex;
  justify-content: center; /* 가로 중앙 */
  align-items: center;     /* 세로 중앙 */
  background-color: #d2e7e0;
  
  
}

.category:hover{
  animation: fly 0.5s ease;
}

.category a{
  text-decoration: none;
  color: black;
}


a:hover{
  color: white;
  font-weight: bold;
  transform: scale(1.1);
}
/* 테블릿 사이즈 (768px 이하) */

@media screen and (max-width : 768px){
  header{
    font-size : 32px;
  }
  nav {
    gap : 10px;
    flex-wrap : wrap;
  }

  .category{
    width : 150px;
    height : 120px;
    font-size : 25px;
  }
  
}

/* 모바일 사이즈(480px)이하  */
@media screen and (max-width: 480px){
  header {
    font-size : 36px;
    margin-bottom : 20px;
  }
  nav {
    flex-direction : column;
   
    align-items : center;
    /* text-align : center; */
    gap : 25px;

  }
  .category{
    width : 180px;
    height : 90px;
    border-radius : 20px;
    font-size : 25px;
  }
}

  </style>
</head>
<body>
  <header> 나만의 맛집 리스트</header>
  <nav>
    
    <div class="category"><a href="./western.html">양식</a> </div>
    <div class="category"><a href="./japanese.html">일식</a></div>
    <div  class="category"><a href="./vietnam.html">베트남식</a></div>

  </nav>
</body>
</html>
